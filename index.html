function downloadExcel(kind) {
  if (!currentDate || !store[currentDate]) {
    showToast('먼저 일자를 선택해주세요', 'error');
    return;
  }
  const channels = Object.keys(store[currentDate]).filter(cg => store[currentDate][cg].detail);
  if (!channels.length) { showToast('데이터가 없습니다', 'error'); return; }

  channels.forEach(cg => {
    const slot = store[currentDate][cg];
    const wb = XLSX.utils.book_new();
    const dStr = currentDate.slice(2).replace(/-/g, '.');

    if (kind === 'detail') {
      // 보고서 / 일일 / 당월 / 시리즈_일일 / 시리즈_당월 / 작성방법 / Sheet1
      XLSX.utils.book_append_sheet(wb, buildReportSheet(slot, cg, currentDate), '보고서');
      XLSX.utils.book_append_sheet(wb, buildIlilSheet(slot, cg, false), '일일');
      XLSX.utils.book_append_sheet(wb, buildIlilSheet(slot, cg, true),  '당월');
      XLSX.utils.book_append_sheet(wb, buildSeriesSheet(slot, false), '시리즈_일일');
      XLSX.utils.book_append_sheet(wb, buildSeriesSheet(slot, true),  '시리즈_당월');
      XLSX.utils.book_append_sheet(wb, buildHowToSheet(), '작성방법');
      XLSX.utils.book_append_sheet(wb, buildSheet1(slot), 'Sheet1');
      XLSX.writeFile(wb, `랜스타(${cg})_상세매출데이터_${dStr}.xlsx`);
    } else {
      // 리스트 / 일별매출 / 일별누적매출 / 상품별누적판매 / 쇼핑몰별누적판매
      XLSX.utils.book_append_sheet(wb, buildListSheet(slot, currentDate), '리스트');
      XLSX.utils.book_append_sheet(wb, buildIlbyeolMaechul(slot), '일별매출');
      XLSX.utils.book_append_sheet(wb, buildIlbyeolNujeok(slot), '일별누적매출');
      XLSX.utils.book_append_sheet(wb, buildSangpum(slot), '상품별누적판매');
      XLSX.utils.book_append_sheet(wb, buildShoppingMall(slot), '쇼핑몰별누적판매');
      XLSX.writeFile(wb, `랜스타(${cg})_매출리스트_${dStr}.xlsx`);
    }
  });
  showToast('Excel 파일을 다운로드합니다', 'success');
}

// ─────────── 상세매출데이터 시트 빌더 ───────────

function buildReportSheet(slot, cg, date) {
  const d = slot.detail;
  const month = date.slice(0, 7);
  const [yy, mm] = month.split('-').map(Number);
  const totalDays = new Date(yy, mm, 0).getDate();
  const dayOfMonth = parseInt(date.slice(8, 10));
  const prevAgg = getPrevMonthAgg(month, [cg]);

  // 상품 통합 리스트 (당월 매출 desc)
  const productMonthlyMap = {};
  (slot.products || []).forEach(p => productMonthlyMap[p.name] = p.revenue_amount || 0);
  const productNames = new Set();
  (slot.products || []).forEach(p => productNames.add(p.name));
  Object.keys(prevAgg.products).forEach(n => productNames.add(n));
  (slot._products_today || []).forEach(p => productNames.add(p.name));
  const sortedProds = Array.from(productNames).sort((a, b) => {
    const av = productMonthlyMap[a] || 0;
    const bv = productMonthlyMap[b] || 0;
    if (bv !== av) return bv - av;
    return a.localeCompare(b);
  });

  const aoa = [];
  const blank = (cols) => Array(cols).fill(null);
  // 상품 합계 행 위치(1-indexed Excel row): lastProdRow = 4 + sortedProds.length
  // 채널 표(종합 행) = lastProdRow + 27 (원본 보고서 양식 R286 매칭)
  const _lastProdRow_pre = 4 + sortedProds.length;
  const _chTotalRow_pre = _lastProdRow_pre + 27;
  const totalRows = Math.max(32, _chTotalRow_pre + 1);
  for (let i = 0; i < totalRows; i++) aoa.push(blank(24));

  // 좌측 요약 정적 텍스트
  aoa[0][19] = '[ 수량 : ea / 단위 : 원(VAT포함) ]';
  aoa[1][1] = '일일 매출 보고서';
  // B5: 수집일 = 사용자가 판매현황을 업로드한 날 (없으면 오늘)
  const _collectedDate = slot._collected_date || (() => {
    const _now = new Date();
    return `${_now.getFullYear()}-${String(_now.getMonth()+1).padStart(2,'0')}-${String(_now.getDate()).padStart(2,'0')}`;
  })();
  aoa[4][1] = _collectedDate;
  aoa[7][1] = '라인업시스템㈜-랜스타';
  aoa[10][1] = ' 당월 목표 매출 A'; aoa[10][2] = d.monthly_goal || 0;
  aoa[12][1] = ' 일 목표 매출 B\n( A / F )';
  aoa[14][1] = ' 월 납품가 매출 C';
  aoa[16][1] = ' 일 납품가 매출 D';
  aoa[18][1] = ' 월 달성율\n[ 기준 / 달성 ]';
  aoa[20][1] = ' 일 달성율\n( D / B)';
  aoa[23][1] = '금일 E'; aoa[23][2] = dayOfMonth;
  aoa[24][1] = '총일수 F'; aoa[24][2] = totalDays;
  aoa[25][1] = '금일 진행률 G\n( E / F )';
  aoa[28][1] = '월마감 예상';
  aoa[29][1] = '전월 vs 당월';
  aoa[30][1] = '증감률';

  // 우측 상품 표 헤더
  aoa[1][8] = '품목';
  aoa[1][11] = '전월 누적';
  aoa[1][14] = '당월 누적';
  aoa[1][17] = '일일';
  aoa[1][21] = '당월마감';
  aoa[1][22] = '전월 vs 당월';
  aoa[1][23] = '증감률';
  aoa[2][11] = '수량';
  aoa[2][12] = '납품가 매출';
  aoa[2][14] = '수량';
  aoa[2][15] = '납품가 매출';
  aoa[2][17] = '수량';
  aoa[2][18] = '납품가 매출';
  aoa[2][21] = '예상금액';
  aoa[2][22] = '차액';

  // 상품 행: 모델명 + 전월 (하드코딩) — 나머지는 수식으로 후처리
  sortedProds.forEach((name, i) => {
    const row = 3 + i;
    const prev = prevAgg.products[name] || { qty: 0, revenue_amount: 0 };
    aoa[row][8] = name;          // I
    aoa[row][11] = prev.qty;     // L (전월 수량 - 하드코딩)
    aoa[row][12] = prev.revenue_amount;  // M (전월 매출 - 하드코딩)
  });

  // 합계 행 위치 (마지막 상품 다음 행)
  const lastProdRow = 4 + sortedProds.length;  // Excel 행 번호 (1-indexed)
  // aoa 인덱스로는 lastProdRow - 1
  aoa[lastProdRow - 1][8] = '합계';

  // === aoa → 시트 ===
  const ws = XLSX.utils.aoa_to_sheet(aoa);

  // === 수식 입력 ===
  const sn_M = 'SUMIF(시리즈_당월!$A:$A,보고서!I{R},시리즈_당월!$B:$B)';
  const sm_M_amt = 'SUMIF(시리즈_당월!$A:$A,보고서!I{R},시리즈_당월!$C:$C)';
  const sn_D = 'SUMIF(시리즈_일일!$A:$A,보고서!I{R},시리즈_일일!$B:$B)';
  const sm_D_amt = 'SUMIF(시리즈_일일!$A:$A,보고서!I{R},시리즈_일일!$C:$C)';

  // 상품 행 수식
  sortedProds.forEach((name, i) => {
    const r = i + 4;  // Excel row (1-indexed)
    const monthly = (slot.products || []).find(p => p.name === name) || { qty: 0, revenue_amount: 0 };
    const today = (slot._products_today || []).find(p => p.name === name) || { qty: 0, revenue_amount: 0 };
    setF(ws, `O${r}`, sn_M.replace('{R}', r), monthly.qty);
    setF(ws, `P${r}`, sm_M_amt.replace('{R}', r), monthly.revenue_amount);
    setF(ws, `R${r}`, sn_D.replace('{R}', r), today.qty);
    setF(ws, `S${r}`, sm_D_amt.replace('{R}', r), today.revenue_amount);
    // 당월마감 예상 = 당월매출 / 진행률 = (P{r}/$C$24)*$C$25
    setF(ws, `V${r}`, `IFERROR((P${r}/$C$24)*$C$25,"")`,
      d.day_progress > 0 ? monthly.revenue_amount / d.day_progress : 0);
    // 차액 = 예상 - 전월매출
    const forecast = d.day_progress > 0 ? monthly.revenue_amount / d.day_progress : 0;
    setF(ws, `W${r}`, `IFERROR(V${r}-M${r},"")`, forecast - (monthly.revenue_amount > 0 || (prevAgg.products[name]?.revenue_amount || 0) > 0 ? (prevAgg.products[name]?.revenue_amount || 0) : 0));
    // 증감률 = 예상/전월 - 1
    const prevRev = prevAgg.products[name]?.revenue_amount || 0;
    setF(ws, `X${r}`, `IFERROR(V${r}/M${r}-1,"")`, prevRev > 0 ? forecast / prevRev - 1 : '');
  });

  // 합계 행 수식
  const sumRow = lastProdRow;  // Excel row
  if (sortedProds.length > 0) {
    const totalMonth = sortedProds.reduce((s, n) => s + ((slot.products || []).find(p => p.name === n)?.revenue_amount || 0), 0);
    const totalDay = sortedProds.reduce((s, n) => s + ((slot._products_today || []).find(p => p.name === n)?.revenue_amount || 0), 0);
    setF(ws, `M${sumRow}`, `SUM(M4:M${sumRow-1})`, sortedProds.reduce((s, n) => s + (prevAgg.products[n]?.revenue_amount || 0), 0));
    setF(ws, `P${sumRow}`, `SUM(P4:P${sumRow-1})`, totalMonth);
    setF(ws, `S${sumRow}`, `SUM(S4:S${sumRow-1})`, totalDay);
    setF(ws, `V${sumRow}`, `SUM(V4:V${sumRow-1})`, d.day_progress > 0 ? totalMonth / d.day_progress : 0);
    setF(ws, `W${sumRow}`, `V${sumRow}-M${sumRow}`,
      (d.day_progress > 0 ? totalMonth / d.day_progress : 0) - sortedProds.reduce((s, n) => s + (prevAgg.products[n]?.revenue_amount || 0), 0));
    setF(ws, `X${sumRow}`, `IFERROR(V${sumRow}/M${sumRow}-1,"")`, '');
  }

  // ────────────── 보고서 하단: 입점몰 누적 표 ──────────────
  // 행 위치 (Excel 1-indexed)
  const chHeader1Row = sumRow + 2;       // 섹션 헤더 (전월 누적/당월 누적/일일결산)
  const chHeader2Row = sumRow + 3;       // 컬럼 헤더 (입점몰/수량/납품가/마진/마진율)
  const chDataStartRow = sumRow + 4;     // 데이터 시작
  const CH_ROW_COUNT = 23;               // 원본 양식과 동일 (padding 포함)
  const chTotalRow = chDataStartRow + CH_ROW_COUNT;  // 종합 행
  // 채널 순서: GROUP_CHANNELS[cg] (없으면 슬롯의 monthly_channels 순서)
  const _chOrder = (typeof GROUP_CHANNELS !== 'undefined' && GROUP_CHANNELS[cg])
    ? [...GROUP_CHANNELS[cg]]
    : ((slot.detail?.monthly_channels || []).map(c => c.channel));
  // lookup 맵
  const _prevChMap = (prevAgg && prevAgg.channels) || {};
  const _monthlyChMap = {};
  (slot.detail?.monthly_channels || []).forEach(c => _monthlyChMap[c.channel] = c);
  const _dailyChMap = {};
  (slot.detail?.daily_channels || []).forEach(c => _dailyChMap[c.channel] = c);

  // 헤더 / 채널 라벨은 ws 셀 직접 쓰기 (aoa는 이미 변환된 시점)
  const _setS = (ref, val) => {
    ws[ref] = { t: 's', v: String(val) };
    if (ws['!ref']) {
      const range = XLSX.utils.decode_range(ws['!ref']);
      const dec = XLSX.utils.decode_cell(ref);
      if (dec.r > range.e.r) range.e.r = dec.r;
      if (dec.c > range.e.c) range.e.c = dec.c;
      ws['!ref'] = XLSX.utils.encode_range(range);
    }
  };
  const _setN = (ref, val) => {
    if (val === 0 || val == null) return;
    ws[ref] = { t: 'n', v: val };
    if (ws['!ref']) {
      const range = XLSX.utils.decode_range(ws['!ref']);
      const dec = XLSX.utils.decode_cell(ref);
      if (dec.r > range.e.r) range.e.r = dec.r;
      if (dec.c > range.e.c) range.e.c = dec.c;
      ws['!ref'] = XLSX.utils.encode_range(range);
    }
  };
  const _colLetter = (idx0) => XLSX.utils.encode_col(idx0);
  // 섹션 헤더 (chHeader1Row): B=구분, C-H=전월 누적 매출, I-N=당월 누적 매출, O-T=일일결산
  _setS(`B${chHeader1Row}`, '구분');
  _setS(`C${chHeader1Row}`, '전월 누적 매출');
  _setS(`I${chHeader1Row}`, '당월 누적 매출');
  _setS(`O${chHeader1Row}`, '일일결산');
  // 섹션 헤더 셀 병합
  ws['!merges'] = ws['!merges'] || [];
  ws['!merges'].push({ s:{r:chHeader1Row-1, c:2}, e:{r:chHeader1Row-1, c:7} });   // C-H 전월
  ws['!merges'].push({ s:{r:chHeader1Row-1, c:8}, e:{r:chHeader1Row-1, c:13} });  // I-N 당월
  ws['!merges'].push({ s:{r:chHeader1Row-1, c:14}, e:{r:chHeader1Row-1, c:19} }); // O-T 일일
  // 행 높이: 헤더 두 줄을 적절히 보이게 설정
  ws['!rows'] = ws['!rows'] || [];
  ws['!rows'][chHeader1Row-1] = { hpt: 22 };
  ws['!rows'][chHeader2Row-1] = { hpt: 28 };
  // 컬럼 헤더 (chHeader2Row)
  _setS(`B${chHeader2Row}`, '입점몰');
  _setS(`C${chHeader2Row}`, '수량');         _setS(`D${chHeader2Row}`, '납품가 매출');
  _setS(`F${chHeader2Row}`, '마진');         _setS(`H${chHeader2Row}`, '마진율');
  _setS(`I${chHeader2Row}`, '수량');         _setS(`J${chHeader2Row}`, '납품가 매출');
  _setS(`L${chHeader2Row}`, '마진');         _setS(`N${chHeader2Row}`, '마진율');
  _setS(`O${chHeader2Row}`, '수량');         _setS(`P${chHeader2Row}`, '납품가 매출');
  _setS(`R${chHeader2Row}`, '마진');         _setS(`T${chHeader2Row}`, '마진율');
  _setS(`V${chHeader2Row}`, '당월마감예상');
  _setS(`W${chHeader2Row}`, '전월 vs 당월');
  _setS(`X${chHeader2Row}`, '증감률');
  // 입점몰 명 + 전월 누적 하드코딩 값
  for (let i = 0; i < CH_ROW_COUNT; i++) {
    const r = chDataStartRow + i;
    const chName = _chOrder[i] || '';
    if (!chName) continue;
    _setS(`B${r}`, chName);
    const prev = _prevChMap[chName] || { qty:0, amount:0, profit:0 };
    _setN(`C${r}`, prev.qty);
    _setN(`D${r}`, prev.amount);
    _setN(`F${r}`, prev.profit);
  }
  // 종합 행 라벨
  _setS(`B${chTotalRow}`, '종합');

  // ─── (이하는 aoa → ws 변환 후 수식 입력 단계로 이동되어야 함) ───
  // 좌측 요약 수식
  // C13: 일 목표 = 당월 목표 / 총일수
  setF(ws, 'C13', 'C11/C25', (d.monthly_goal || 0) / totalDays);
  // C15: 월 매출 = 채널 표 종합 J열 (당월 누적 납품가 합)
  if (sortedProds.length > 0) {
    setF(ws, 'C15', `SUM(J${chTotalRow})`, d.monthly_revenue || 0);
    setF(ws, 'C17', `SUM(P${chTotalRow})`, d.daily_revenue || 0);
    setF(ws, 'C29', `V${chTotalRow}`, d.month_forecast || 0);
    setF(ws, 'C30', `W${chTotalRow}`, (d.month_forecast || 0) - (prevAgg.totalRevenue || 0));
    setF(ws, 'C31', `X${chTotalRow}`, prevAgg.totalRevenue > 0 ? (d.month_forecast - prevAgg.totalRevenue) / prevAgg.totalRevenue : '');
  } else {
    if ((d.monthly_revenue || 0) !== 0) ws['C15'] = { t:'n', v: d.monthly_revenue };
    if ((d.daily_revenue || 0) !== 0) ws['C17'] = { t:'n', v: d.daily_revenue };
  }
  // C26: 금일 진행률 = E/F
  setF(ws, 'C26', 'C24/C25', dayOfMonth / totalDays);
  // C19: 월 달성율 [기준] = 금일 진행률
  setF(ws, 'C19', 'C26', dayOfMonth / totalDays);
  // E19: 월 달성율 [달성] = 월 매출 / 당월 목표
  setF(ws, 'E19', 'IFERROR(C15/C11,"")',
    (d.monthly_goal || 0) > 0 ? (d.monthly_revenue || 0) / d.monthly_goal : '');
  // C21: 일 달성율 = 일 매출 / 일 목표
  setF(ws, 'C21', 'IFERROR(C17/C13,"")',
    (d.daily_goal || 0) > 0 ? (d.daily_revenue || 0) / d.daily_goal : '');

  // ────────────── 채널 표 수식 입력 ──────────────
  for (let i = 0; i < CH_ROW_COUNT; i++) {
    const r = chDataStartRow + i;
    const chName = _chOrder[i] || '';
    if (!chName) continue;
    const prev = _prevChMap[chName] || { qty:0, amount:0, profit:0 };
    const m = _monthlyChMap[chName] || { qty:0, amount:0, profit:0 };
    const dCh = _dailyChMap[chName] || { qty:0, amount:0, profit:0 };
    // 전월 마진율 H = F/D
    setF(ws, `H${r}`, `IFERROR(F${r}/D${r}, "")`, prev.amount > 0 ? prev.profit / prev.amount : '');
    // 당월 누적 (당월 시트 VLOOKUP)
    setF(ws, `I${r}`, `IFERROR(VLOOKUP(B${r},당월!$A$2:$D$71,2,FALSE), "")`, m.qty);
    setF(ws, `J${r}`, `IFERROR(VLOOKUP(B${r},당월!$A$2:$D$71,3,FALSE), "")`, m.amount);
    setF(ws, `L${r}`, `IFERROR(VLOOKUP(B${r},당월!$A$2:$D$71,4,FALSE), "")`, m.profit);
    setF(ws, `N${r}`, `IFERROR(L${r}/J${r}, "")`, m.amount > 0 ? m.profit / m.amount : '');
    // 일일 결산 (일일 시트 VLOOKUP)
    setF(ws, `O${r}`, `IFERROR(VLOOKUP(B${r},일일!$A$2:$D$27,2,FALSE), "")`, dCh.qty);
    setF(ws, `P${r}`, `IFERROR(VLOOKUP(B${r},일일!$A$2:$D$27,3,FALSE), "")`, dCh.amount);
    setF(ws, `R${r}`, `IFERROR(VLOOKUP(B${r},일일!$A$2:$D$27,4,FALSE), "")`, dCh.profit);
    setF(ws, `T${r}`, `IFERROR(R${r}/P${r}, "")`, dCh.amount > 0 ? dCh.profit / dCh.amount : '');
    // 당월마감예상 V = (J/$C$24)*$C$25
    const _forecast = dayOfMonth > 0 ? (m.amount / dayOfMonth) * totalDays : 0;
    setF(ws, `V${r}`, `IFERROR((J${r}/$C$24)*$C$25, "")`, _forecast);
    // 전월 vs 당월 차액 W = V - D
    setF(ws, `W${r}`, `IFERROR(V${r}-D${r}, "")`, prev.amount > 0 ? _forecast - prev.amount : '');
    // 증감률 X = V/D - 1
    setF(ws, `X${r}`, `IFERROR(V${r}/D${r}-1, "")`, prev.amount > 0 ? _forecast / prev.amount - 1 : '');
  }
  // 채널 표 종합 행
  const _r0 = chDataStartRow;
  const _r1 = chDataStartRow + CH_ROW_COUNT - 1;
  const _sumPrev = _chOrder.slice(0, CH_ROW_COUNT).reduce((acc, ch) => {
    const p = _prevChMap[ch] || { qty:0, amount:0, profit:0 };
    acc.qty += p.qty || 0; acc.amount += p.amount || 0; acc.profit += p.profit || 0;
    return acc;
  }, { qty:0, amount:0, profit:0 });
  const _sumMonth = _chOrder.slice(0, CH_ROW_COUNT).reduce((acc, ch) => {
    const m = _monthlyChMap[ch] || { qty:0, amount:0, profit:0 };
    acc.qty += m.qty || 0; acc.amount += m.amount || 0; acc.profit += m.profit || 0;
    return acc;
  }, { qty:0, amount:0, profit:0 });
  const _sumDay = _chOrder.slice(0, CH_ROW_COUNT).reduce((acc, ch) => {
    const x = _dailyChMap[ch] || { qty:0, amount:0, profit:0 };
    acc.qty += x.qty || 0; acc.amount += x.amount || 0; acc.profit += x.profit || 0;
    return acc;
  }, { qty:0, amount:0, profit:0 });
  setF(ws, `C${chTotalRow}`, `SUM(C${_r0}:C${_r1})`, _sumPrev.qty);
  setF(ws, `D${chTotalRow}`, `SUM(D${_r0}:D${_r1})`, _sumPrev.amount);
  setF(ws, `F${chTotalRow}`, `SUM(F${_r0}:F${_r1})`, _sumPrev.profit);
  setF(ws, `H${chTotalRow}`, `IFERROR(F${chTotalRow}/D${chTotalRow}, "")`, _sumPrev.amount > 0 ? _sumPrev.profit / _sumPrev.amount : '');
  setF(ws, `I${chTotalRow}`, `SUM(I${_r0}:I${_r1})`, _sumMonth.qty);
  setF(ws, `J${chTotalRow}`, `SUM(J${_r0}:J${_r1})`, _sumMonth.amount);
  setF(ws, `L${chTotalRow}`, `SUM(L${_r0}:L${_r1})`, _sumMonth.profit);
  setF(ws, `N${chTotalRow}`, `IFERROR(L${chTotalRow}/J${chTotalRow}, "")`, _sumMonth.amount > 0 ? _sumMonth.profit / _sumMonth.amount : '');
  setF(ws, `O${chTotalRow}`, `SUM(O${_r0}:O${_r1})`, _sumDay.qty);
  setF(ws, `P${chTotalRow}`, `SUM(P${_r0}:P${_r1})`, _sumDay.amount);
  setF(ws, `R${chTotalRow}`, `SUM(R${_r0}:R${_r1})`, _sumDay.profit);
  setF(ws, `T${chTotalRow}`, `IFERROR(R${chTotalRow}/P${chTotalRow}, "")`, _sumDay.amount > 0 ? _sumDay.profit / _sumDay.amount : '');
  const _totalForecast = dayOfMonth > 0 ? (_sumMonth.amount / dayOfMonth) * totalDays : 0;
  setF(ws, `V${chTotalRow}`, `SUM(V${_r0}:V${_r1})`, _totalForecast);
  setF(ws, `W${chTotalRow}`, `SUM(W${_r0}:W${_r1})`, _sumPrev.amount > 0 ? _totalForecast - _sumPrev.amount : '');
  setF(ws, `X${chTotalRow}`, `IFERROR(V${chTotalRow}/D${chTotalRow}-1, "")`, _sumPrev.amount > 0 ? _totalForecast / _sumPrev.amount - 1 : '');

  // 컬럼 너비 (상품 표 + 채널 표 양쪽에 맞춤)
  ws['!cols'] = [
    {wch:2},{wch:22},{wch:14},{wch:14},{wch:10},{wch:14},{wch:2},{wch:6},
    {wch:22},{wch:14},{wch:2},
    {wch:14},{wch:14},{wch:6},
    {wch:8},{wch:14},{wch:2},
    {wch:14},{wch:14},{wch:6},{wch:2},
    {wch:14},{wch:14},{wch:10}
  ];
  // 백분율 컬럼: E19, C19, C21, C26, X{*}
  // formatNumbers는 셀 단위가 아니라 컬럼 단위로 처리하므로 해당 셀에 직접 적용
  formatNumbers(ws);
  // 백분율 셀 후처리 (정수)
  ['C19','E19','C21','C26','C31'].forEach(ref => {
    if (ws[ref] && typeof ws[ref].v === 'number') ws[ref].z = '0%';
  });
  // X열 (증감률) - 상품 표 (정수)
  for (let r = 4; r <= sumRow; r++) {
    const ref = `X${r}`;
    if (ws[ref] && typeof ws[ref].v === 'number') ws[ref].z = '0%';
  }
  // 채널 표의 마진율(H,N,T) 및 증감률(X) 백분율 포맷 (정수)
  for (let r = chDataStartRow; r <= chTotalRow; r++) {
    ['H','N','T','X'].forEach(col => {
      const ref = `${col}${r}`;
      if (ws[ref] && typeof ws[ref].v === 'number') ws[ref].z = '0%';
    });
  }
  // ────────────── 셀 테두리 적용 ──────────────
  applyBorders(ws, [
    // 좌측 요약 (B-E, 11~31)
    { range: 'B11:E31' },
    // 상품 표 (I-X, 2~합계행)
    { range: `I2:X${sumRow}` },
    // 채널 표 (B-X, 헤더1~종합)
    { range: `B${chHeader1Row}:X${chTotalRow}` },
  ]);
  return ws;
}

// 시트의 사용 영역(!ref) 전체에 thin border 적용 (모든 시트 공용)
function borderAll(ws) {
  if (!ws || !ws['!ref']) return ws;
  applyBorders(ws, [{ range: ws['!ref'] }]);
  return ws;
}

// 셀 범위에 thin black border 적용 (xlsx-js-style)
function applyBorders(ws, regions) {
  const thin = { style: 'thin', color: { rgb: '000000' } };
  const border = { top: thin, bottom: thin, left: thin, right: thin };
  regions.forEach(({ range }) => {
    const r = XLSX.utils.decode_range(range);
    for (let row = r.s.r; row <= r.e.r; row++) {
      for (let col = r.s.c; col <= r.e.c; col++) {
        const ref = XLSX.utils.encode_cell({ r: row, c: col });
        if (!ws[ref]) {
          // 빈 셀이라도 테두리는 표시되도록 placeholder 추가
          ws[ref] = { t: 's', v: '' };
        }
        ws[ref].s = ws[ref].s || {};
        ws[ref].s.border = border;
        // 헤더/라벨 셀은 가운데 정렬
        const isHeader = ws[ref].t === 's' && ws[ref].v;
        if (isHeader) {
          ws[ref].s.alignment = ws[ref].s.alignment || { vertical: 'center', horizontal: 'center', wrapText: true };
        } else {
          ws[ref].s.alignment = ws[ref].s.alignment || { vertical: 'center' };
        }
      }
    }
    // !ref 갱신
    if (ws['!ref']) {
      const cur = XLSX.utils.decode_range(ws['!ref']);
      if (r.e.r > cur.e.r) cur.e.r = r.e.r;
      if (r.e.c > cur.e.c) cur.e.c = r.e.c;
      ws['!ref'] = XLSX.utils.encode_range(cur);
    }
  });
}

// 셀에 수식과 계산 값을 함께 저장
function setF(ws, ref, formula, value) {
  // 0이면 셀을 빈 상태로 두기 (위 formatNumbers와 일관성)
  if (typeof value === 'number' && value === 0) {
    return;
  }
  if (typeof value === 'number') {
    ws[ref] = { t: 'n', f: formula, v: value };
  } else if (value === '' || value == null) {
    ws[ref] = { t: 's', f: formula, v: '' };
  } else {
    ws[ref] = { t: typeof value === 'number' ? 'n' : 's', f: formula, v: value };
  }
  // 시트 범위(!ref) 갱신
  if (ws['!ref']) {
    const range = XLSX.utils.decode_range(ws['!ref']);
    const decoded = XLSX.utils.decode_cell(ref);
    if (decoded.r > range.e.r) range.e.r = decoded.r;
    if (decoded.c > range.e.c) range.e.c = decoded.c;
    ws['!ref'] = XLSX.utils.encode_range(range);
  }
}


// 숫자 셀에 천단위 콤마 자동 적용 + 0은 빈칸 처리 (소수점 제거: 정수 반올림)
function formatNumbers(ws, percentCols) {
  if (!ws['!ref']) return ws;
  const range = XLSX.utils.decode_range(ws['!ref']);
  for (let r = range.s.r; r <= range.e.r; r++) {
    for (let c = range.s.c; c <= range.e.c; c++) {
      const ref = XLSX.utils.encode_cell({ r, c });
      const cell = ws[ref];
      if (cell && typeof cell.v === 'number') {
        if (cell.v === 0) {
          // 0 → 빈칸 (시각적으로 깔끔)
          delete ws[ref];
          continue;
        }
        if (percentCols && percentCols.includes(c)) {
          cell.z = '0%';   // 백분율: 정수
        } else {
          cell.z = '#,##0'; // 일반 숫자: 정수 (소수점은 Excel이 반올림 표시)
        }
      }
    }
  }
  return ws;
}

function buildIlilSheet(slot, cg, isMonthly) {

  const data = isMonthly ? (slot.detail.monthly_channels || []) : (slot.detail.daily_channels || []);
  const dataMap = {};
  data.forEach(c => dataMap[c.channel] = c);
  // 표준 채널 순서대로 표시 + 데이터에 있는 추가 채널
  const groupChs = (typeof GROUP_CHANNELS !== 'undefined' && GROUP_CHANNELS[cg]) || [];

  const aoa = [['매출처명', '순판매수량', '순공급금액', '순이익']];

      c && c.amount ? c.amount : null,
      c && c.profit !== undefined ? c.profit : null,
    ]);

  const ws = XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols'] = [{wch:18},{wch:12},{wch:14},{wch:14}];
  return borderAll(formatNumbers(ws));
}

function buildListSheet(slot, currentDate) {
  // 정산월 / 발주월 / 적정재고 / 발주일 / 쇼핑몰 / 상품명 / 모델명 / 수량 / 구분 / 배송료 / 사은품 / 고객배송비
  // 매입단가(원가) / 매입가(합계) / 납품단가 / 납품가(합계) / 판매단가 / 판매가(합계) / 사은품 / 입금부대비용 / 지급부대비용 / 마진
  const headers = ['정산월','발주월','적정재고','발주일','쇼핑몰','상품명','모델명','수량','구분','배송료','사은품','고객배송비','매입단가(원가)','매입가(합계)','납품단가','납품가(합계)','판매단가','판매가(합계)','사은품','입금부대비용','지급부대비용','마진','배송비그룹','배송비단가','배송비차감마진'];
  const aoa = [headers];

  // 그 달의 모든 트랜잭션을 모음 (현재 일자뿐만 아니라 같은 달 전체)
  const month = currentDate.slice(0, 7);
  const cg = slot.channel;
  const monthYY = month.slice(2, 4) + '-' + month.slice(5, 7);
  const txnMaster = [];
  for (const d of Object.keys(store).sort()) {
    if (!d.startsWith(month)) continue;
    const s = store[d][cg];
    if (!s || !s._transactions) continue;
    const shippingMap = computeShippingMap(s._transactions);
    s._transactions.forEach(t => {
      const ch = channelMap(t.shop);
      const itemCode = String(t.item_code || '');
      const isDelivery = itemCode.startsWith('DEL-');
      const groupName = String(t.group_name || '');
      const isDiscount = /판매장려금/.test(groupName);
      let category = '주문';
      if (isDelivery) category = '배송비';
      else if (isDiscount) category = '할인';
      else if ((t.qty || 0) < 0) category = '반품';
      const qty = t.qty || 0;
      const amount = t.amount || 0;
      const cost = (t.cost_unit || 0) * qty;
      const margin = amount - cost;
      const unitPrice = qty !== 0 ? amount / qty : 0;
      // 배송비 차감 마진 (자동 계산: shippingMap 활용)
      const shipGrp = (category === '주문') ? shippingGroupOf(t.model) : '';
      const shipRate = (category === '주문') ? (shippingMap.get(t) || 0) : 0;
      const netMargin = (category === '주문') ? margin - shipRate : margin;
      aoa.push([
        null, monthYY, null, d, ch,
        t.desc || '', t.model || '',
        qty, category, null, null, null,
        t.cost_unit || 0, cost, unitPrice, amount, unitPrice, amount,
        null, 0, 0, margin,
        shipGrp, shipRate, netMargin
      ]);
    });
  }
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols'] = [
    {wch:8},{wch:8},{wch:8},{wch:11},{wch:14},{wch:50},{wch:18},
    {wch:6},{wch:8},{wch:8},{wch:8},{wch:10},
    {wch:12},{wch:13},{wch:12},{wch:13},{wch:12},{wch:13},
    {wch:6},{wch:11},{wch:11},{wch:11},
    {wch:9},{wch:11},{wch:13}
  ];
  return borderAll(formatNumbers(ws));
}

function buildIlbyeolMaechul(slot) {
  // 일별 매출 리스트 (피벗): 발주일 | 쇼핑몰 | 상품명 | 구분 | 수량 | 매입가 | 납품가 | 판매가 | 입금부대비용 | 지급부대비용 | 마진
  const aoa = [
    ['일별 매출 리스트'],
    [],
    [null, null, null, null, '데이터'],
    ['발주일','쇼핑몰','상품명','구분','수량.','매입가','납품가','판매가','입금부대비용.','지급부대비용.','마진.']
  ];

  const month = slot.upload_date.slice(0, 7);
  const cg = slot.channel;
  // 일자별 → 쇼핑몰별 → 상품별 트랜잭션 모으기
  const dates = Object.keys(store).filter(d => d.startsWith(month) && store[d][cg]?._transactions).sort();
  for (const d of dates) {
    const txns = store[d][cg]._transactions;
    // 쇼핑몰별로 그룹화
    const byShop = {};
    txns.forEach(t => {
      const ch = channelMap(t.shop);
      if (!byShop[ch]) byShop[ch] = [];
      byShop[ch].push(t);
    });
    let dateShown = false;
    for (const ch of Object.keys(byShop).sort((a,b) => {
      const aSum = byShop[a].reduce((s,t) => s + (t.amount||0), 0);
      const bSum = byShop[b].reduce((s,t) => s + (t.amount||0), 0);
      return bSum - aSum;
    })) {
      const shopTxns = byShop[ch];
      let shopShown = false;
      let shopQty=0, shopCost=0, shopAmt=0, shopMargin=0;
      shopTxns.forEach(t => {
        const itemCode = String(t.item_code || '');
        const isDelivery = itemCode.startsWith('DEL-');
        const groupName = String(t.group_name || '');
        const isDiscount = /판매장려금/.test(groupName);
        let category = '주문';
        if (isDelivery) category = '배송비';
        else if (isDiscount) category = '할인';
        else if ((t.qty || 0) < 0) category = '반품';
        const qty = t.qty || 0;
        const amount = t.amount || 0;
        const cost = (t.cost_unit || 0) * qty;
        const margin = amount - cost;
        const name = isDelivery ? '택배' : (t.model || t.desc || '');
        aoa.push([
          dateShown ? null : d,
          shopShown ? null : ch,
          name, category,
          qty, cost, amount, amount, 0, 0, margin
        ]);
        dateShown = true; shopShown = true;
        shopQty += qty; shopCost += cost; shopAmt += amount; shopMargin += margin;
      });
      // 쇼핑몰 요약 행
      aoa.push([null, ch + ' 요약', null, null, shopQty, shopCost, shopAmt, shopAmt, 0, 0, shopMargin]);
    }
  }
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols'] = [{wch:11},{wch:14},{wch:18},{wch:8},{wch:7},{wch:12},{wch:12},{wch:12},{wch:11},{wch:11},{wch:11}];
  return borderAll(formatNumbers(ws));
}

function buildIlbyeolNujeok(slot) {
  // 일별 누적 매출: 발주일 | 구분 | 수량 | 매입가 | 납품가 | 판매가 | 마진
  const aoa = [
    ['일별 누적 매출'],
    [],
    [null, null, '데이터'],
    ['발주일','구분','수량.','매입가','납품가','판매가','마진.']
  ];

  const month = slot.upload_date.slice(0, 7);
  const cg = slot.channel;
  const dates = Object.keys(store).filter(d => d.startsWith(month) && store[d][cg]?._transactions).sort();
  let totalQty=0, totalCost=0, totalAmt=0, totalMargin=0;
  for (const d of dates) {
    const txns = store[d][cg]._transactions;
    const byCat = { '주문': {qty:0,cost:0,amt:0,margin:0}, '반품': {qty:0,cost:0,amt:0,margin:0}, '배송비': {qty:0,cost:0,amt:0,margin:0}, '할인': {qty:0,cost:0,amt:0,margin:0} };
    txns.forEach(t => {
      const itemCode = String(t.item_code || '');
      const isDelivery = itemCode.startsWith('DEL-');
      const groupName = String(t.group_name || '');
      const isDiscount = /판매장려금/.test(groupName);
      let category = '주문';
      if (isDelivery) category = '배송비';
      else if (isDiscount) category = '할인';
      else if ((t.qty || 0) < 0) category = '반품';
      const qty = t.qty || 0;
      const amount = t.amount || 0;
      const cost = (t.cost_unit || 0) * qty;
      const margin = amount - cost;
      byCat[category].qty += qty;
      byCat[category].cost += cost;
      byCat[category].amt += amount;
      byCat[category].margin += margin;
    });
    let dateShown = false;
    let dQty=0, dCost=0, dAmt=0, dMargin=0;
    ['반품','주문','배송비','할인'].forEach(cat => {
      const v = byCat[cat];
      if (v.qty === 0 && v.amt === 0) return;
      aoa.push([dateShown ? null : d, cat, v.qty, v.cost, v.amt, v.amt, v.margin]);
      dateShown = true;
      dQty += v.qty; dCost += v.cost; dAmt += v.amt; dMargin += v.margin;
    });
    totalQty += dQty; totalCost += dCost; totalAmt += dAmt; totalMargin += dMargin;
    aoa.push(['누적', null, totalQty, totalCost, totalAmt, totalAmt, totalMargin]);
  }
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols'] = [{wch:11},{wch:8},{wch:8},{wch:14},{wch:14},{wch:14},{wch:14}];
  return borderAll(formatNumbers(ws));
}

function buildSangpum(slot) {
  // 상품별 누적 판매: 상품명 + 1주문/3반품/배송비 별 (납품가, 매입가, 수량, 판매가)
  const aoa = [
    ['쇼핑몰', '(모두)'],
    [],
    [null, '구분', '데이터'],
    [null, '1주문', null, null, null, '3반품', null, null, null, '배송비'],
    ['상품명','납품가','매입가','수량.','판매가','납품가','매입가','수량.','판매가','납품가','매입가','수량.']
  ];

  // 상품별 + 구분별 집계
  const month = slot.upload_date.slice(0, 7);
  const cg = slot.channel;
  const dates = Object.keys(store).filter(d => d.startsWith(month) && store[d][cg]?._transactions).sort();
  const map = {};  // name → { 주문: {amt,cost,qty}, 반품:..., 배송비:... }
  for (const d of dates) {
    store[d][cg]._transactions.forEach(t => {
      const itemCode = String(t.item_code || '');
      const isDelivery = itemCode.startsWith('DEL-');
      const groupName = String(t.group_name || '');
      const isDiscount = /판매장려금/.test(groupName);
      if (isDiscount) return;  // 할인 제외
      let category = '주문';
      if (isDelivery) category = '배송비';
      else if ((t.qty || 0) < 0) category = '반품';
      const name = isDelivery ? '택배' : (t.model || t.desc || '');
      if (!name) return;
      const qty = t.qty || 0;
      const amount = t.amount || 0;
      const cost = (t.cost_unit || 0) * qty;
      if (!map[name]) map[name] = { '주문':{amt:0,cost:0,qty:0}, '반품':{amt:0,cost:0,qty:0}, '배송비':{amt:0,cost:0,qty:0} };
      map[name][category].amt += amount;
      map[name][category].cost += cost;
      map[name][category].qty += qty;
    });
  }
  Object.keys(map).sort().forEach(name => {
    const r = map[name];
    aoa.push([
      name,
      r['주문'].amt || null, r['주문'].cost || null, r['주문'].qty || null, r['주문'].amt || null,
      r['반품'].amt || null, r['반품'].cost || null, r['반품'].qty || null, r['반품'].amt || null,
      r['배송비'].amt || null, r['배송비'].cost || null, r['배송비'].qty || null,
    ]);
  });
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols'] = [{wch:22},{wch:12},{wch:12},{wch:8},{wch:12},{wch:12},{wch:12},{wch:8},{wch:12},{wch:12},{wch:12},{wch:8}];
  return borderAll(formatNumbers(ws));
}

function buildShoppingMall(slot) {
  // 쇼핑몰별 누적 판매: 쇼핑몰 | 구분 | 수량 | 매입가 | 납품가 | 판매가 | 합계: 마진
  const aoa = [
    ['쇼핑몰별 판매 리스트'],
    [],
    [null, null, '데이터'],
    ['쇼핑몰','구분','수량.','매입가','납품가','판매가','합계 : 마진']
  ];

  const month = slot.upload_date.slice(0, 7);
  const cg = slot.channel;
  const dates = Object.keys(store).filter(d => d.startsWith(month) && store[d][cg]?._transactions).sort();
  // 쇼핑몰 → 구분별 집계
  const byShop = {};
  for (const d of dates) {
    store[d][cg]._transactions.forEach(t => {
      const ch = channelMap(t.shop);
      const itemCode = String(t.item_code || '');
      const isDelivery = itemCode.startsWith('DEL-');
      const groupName = String(t.group_name || '');
      const isDiscount = /판매장려금/.test(groupName);
      let category = '주문';
      if (isDelivery) category = '배송비';
      else if (isDiscount) category = '할인';
      else if ((t.qty || 0) < 0) category = '반품';
      const qty = t.qty || 0;
      const amount = t.amount || 0;
      const cost = (t.cost_unit || 0) * qty;
      const margin = amount - cost;
      if (!byShop[ch]) byShop[ch] = {};
      if (!byShop[ch][category]) byShop[ch][category] = { qty:0, cost:0, amt:0, margin:0 };
      byShop[ch][category].qty += qty;
      byShop[ch][category].cost += cost;
      byShop[ch][category].amt += amount;
      byShop[ch][category].margin += margin;
    });
  }

  // 매출 큰 순으로 쇼핑몰 정렬
  const shopList = Object.keys(byShop).sort((a, b) => {
    const aSum = Object.values(byShop[a]).reduce((s, v) => s + v.amt, 0);
    const bSum = Object.values(byShop[b]).reduce((s, v) => s + v.amt, 0);
    return bSum - aSum;
  });
  let grandQty=0, grandCost=0, grandAmt=0, grandMargin=0;
  shopList.forEach(shop => {
    let shopShown = false;
    let sQty=0, sCost=0, sAmt=0, sMargin=0;
    ['반품','주문','배송비','할인'].forEach(cat => {
      const v = byShop[shop][cat];
      if (!v || (v.qty === 0 && v.amt === 0)) return;
      aoa.push([shopShown ? null : shop, cat, v.qty, v.cost, v.amt, v.amt, v.margin]);
      shopShown = true;
      sQty += v.qty; sCost += v.cost; sAmt += v.amt; sMargin += v.margin;
    });
    aoa.push([shop + ' 요약', null, sQty, sCost, sAmt, sAmt, sMargin]);
    grandQty += sQty; grandCost += sCost; grandAmt += sAmt; grandMargin += sMargin;
  });
  aoa.push(['총합계', null, grandQty, grandCost, grandAmt, grandAmt, grandMargin]);
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols'] = [{wch:18},{wch:8},{wch:8},{wch:14},{wch:14},{wch:14},{wch:14}];
  return borderAll(formatNumbers(ws));
}

document.getElementById('btnImport').addEventListener('click', () => document.getElementById('importInput').click());
document.getElementById('importInput').addEventListener('change', async e => {
  const file = e.target.files[0]; if (!file) return;
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    store = { ...store, ...data };
    saveStore();
    renderDateList();
    if (!currentDate) {
      const dates = Object.keys(store).sort();
      currentDate = dates[dates.length - 1];
    }
    render();
    showToast('데이터를 가져왔습니다', 'success');
  } catch(err) {
    showToast('파일을 읽을 수 없습니다', 'error');
  }
});

document.getElementById('btnClear').addEventListener('click', () => {
  if (!confirm('정말 모든 데이터를 삭제하시겠습니까?')) return;
  store = {};
  currentDate = null;
  saveStore();
  renderDateList();
  render();
  showToast('모든 데이터가 삭제되었습니다');
});

// 검색 입력 이벤트
const searchInput = document.getElementById('dateSearch');
if (searchInput) {
  let searchTimer;
  searchInput.addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => renderDateList(), 100);
  });
}

// ================================================================
// 시작
// ================================================================
recomputeAggregates();
const dates = Object.keys(store).sort();
if (dates.length > 0) currentDate = dates[dates.length - 1];
renderDateList();
render();
</script>
